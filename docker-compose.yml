services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: zimradar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: zimradar
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/storage/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zimradar"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0

  prefect:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_UI_API_URL: http://187.77.95.56:4200/api
    ports:
      - "4200:4200"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    build:
      context: .
      target: worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://zimradar:${POSTGRES_PASSWORD:-password}@postgres:5432/zimradar
      TEST_DATABASE_URL: postgresql+asyncpg://zimradar:${POSTGRES_PASSWORD:-password}@postgres:5432/zimradar_test
      REDIS_URL: redis://redis:6379
      PREFECT_API_URL: http://prefect:4200/api
      OLLAMA_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      prefect:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - zimradar_data:/app/data

  streamlit:
    build:
      context: .
      target: streamlit
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://zimradar:${POSTGRES_PASSWORD:-password}@postgres:5432/zimradar
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      target: api
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://zimradar:${POSTGRES_PASSWORD:-password}@postgres:5432/zimradar
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
    ports:
      - "8000:8000"
    volumes:
      - zimradar_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  ollama_data:
  zimradar_data:
