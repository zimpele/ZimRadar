name: zimradar
prefect-version: "3"

deployments:
  - name: train-xgboost-classifier
    entrypoint: src/pipeline/train_flow.py:train_classifier_flow
    work_pool:
      name: default-agent-pool
    description: "Train XGBoost risk classifier from real FEMA + NOAA data"
    tags:
      - ml
      - training

  - name: ingest-fema
    entrypoint: src/ingestion/fema.py:ingest_fema_flow
    work_pool:
      name: default-agent-pool
    description: "Bulk sync FEMA disaster declarations"
    tags:
      - ingestion

  - name: ingest-noaa
    entrypoint: src/ingestion/noaa.py:ingest_noaa_flow
    work_pool:
      name: default-agent-pool
    description: "Daily NOAA weather observations"
    tags:
      - ingestion

  - name: ingest-sentinel2
    entrypoint: src/ingestion/sentinel2.py:ingest_sentinel2_flow
    work_pool:
      name: default-agent-pool
    description: "Fetch and process Sentinel-2 satellite tiles"
    tags:
      - ingestion

  - name: ingest-fema-nri
    entrypoint: src/ingestion/fema_nri.py:ingest_fema_nri_flow
    work_pool:
      name: default-agent-pool
    description: "Download FEMA National Risk Index county scores (run once, refresh annually)"
    tags:
      - ingestion

  - name: ingest-noaa-counties
    entrypoint: src/ingestion/noaa_counties.py:ingest_noaa_counties_flow
    work_pool:
      name: default-agent-pool
    description: "Bulk NOAA station lookup + 2yr precipitation trend for all FEMA counties"
    tags:
      - ingestion

  - name: seed-state-regions
    entrypoint: src/ingestion/state_regions.py:seed_state_regions_flow
    work_pool:
      name: default-agent-pool
    description: "Create region entries for all counties in given US states (default: CA, FL)"
    tags:
      - ingestion
      - setup

  - name: bulk-ingest-sentinel2-states
    entrypoint: src/ingestion/state_regions.py:bulk_ingest_sentinel2_flow
    work_pool:
      name: default-agent-pool
    description: "Bulk Sentinel-2 ingestion for all county regions in given US states"
    tags:
      - ingestion
      - satellite
